name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout contracts
        uses: actions/checkout@v4
        with:
          repository: kaiqueRoc/trip-sync-contracts
          path: trip-sync-contracts
          ref: main
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build contracts
        run: |
          if [ -d trip-sync-contracts ]; then
            cd trip-sync-contracts && npm ci && npm run build
          elif [ -d ../trip-sync-contracts ]; then
            cd ../trip-sync-contracts && npm ci && npm run build
          fi

      - name: Install and verify
        run: |
          if [ -d trip-sync-contracts ]; then
            npm pkg set dependencies.@trip-sync/contracts="file:./trip-sync-contracts"
          fi
          npm ci
          npm run db:generate
          npm run lint
          npm run docs:check
